<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Lógico Pro - Simulación Dinámica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Montserrat:wght@800&display=swap');

        body { 
            background-color: #0f172a; 
            color: white; 
            font-family: 'Fira Code', monospace;
            overflow-x: hidden;
        }

        /* Fondo tecnológico con rejilla brillante */
        .grid-bg {
            background-color: #e2e8f0;
            background-image: 
                linear-gradient(rgba(203, 213, 225, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(203, 213, 225, 0.5) 1px, transparent 1px);
            background-size: 30px 30px;
            border-radius: 15px;
            position: relative;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.1), 0 0 20px rgba(0,0,0,0.3);
        }

        /* Estilos de cables y señales */
        .wire { fill: none; stroke-width: 4; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); stroke-linecap: round; }
        .high { stroke: #ef4444; filter: drop-shadow(0 0 8px #ef4444); stroke-dasharray: 8; animation: moveWire 1s linear infinite; }
        .low { stroke: #2563eb; stroke-dasharray: none; opacity: 0.7; }

        @keyframes moveWire {
            to { stroke-dashoffset: -16; }
        }

        /* Burbujas de estado dinámicas */
        .status-bubble {
            font-size: 12px;
            font-weight: bold;
            paint-order: stroke;
            stroke: #fff;
            stroke-width: 3px;
            transition: all 0.3s;
        }
        .bubble-high { fill: #ef4444; }
        .bubble-low { fill: #2563eb; }

        .gate-body { fill: #f8fafc; stroke: #334155; stroke-width: 2.5; }
        .gate-text { fill: #1e293b; font-size: 12px; font-weight: 800; pointer-events: none; }

        .btn-logic {
            transition: all 0.2s;
            cursor: pointer;
            border: 4px solid #fff;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        .btn-logic:active { transform: translateY(4px); box-shadow: none; }
        
        .panel-glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-7xl mx-auto space-y-6">
        <!-- HEADER COLORIDO -->
        <div class="flex flex-col md:flex-row justify-between items-center bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 p-6 rounded-2xl shadow-2xl border-b-8 border-black/20">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-white mb-1" style="font-family: 'Montserrat', sans-serif;">LABORATORIO LÓGICO VIRTUAL</h1>
                <p class="text-xs font-bold text-blue-100 opacity-80 uppercase tracking-widest">Análisis Dinámico de Ecuación: F = (A'B'C) + (A'BC) + (ABC)</p>
            </div>
            <div id="sim-status" class="mt-4 md:mt-0 px-4 py-2 bg-white text-blue-700 font-black rounded-full animate-pulse shadow-lg">
                SISTEMA ACTIVO
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- PANEL DE CONTROL IZQUIERDO -->
            <div class="lg:col-span-3 space-y-4">
                <div class="panel-glass p-6 rounded-2xl border-l-8 border-red-500">
                    <h2 class="text-sm font-black mb-6 text-red-400 uppercase tracking-tighter italic">Entradas de Señal</h2>
                    <div class="space-y-8" id="input-controls">
                        <!-- A -->
                        <div class="flex items-center justify-between">
                            <span class="text-2xl font-black">A</span>
                            <div onclick="toggleVar('A')" id="btn-A" class="btn-logic w-16 h-16 rounded-xl bg-blue-600 flex items-center justify-center text-3xl font-black">0</div>
                        </div>
                        <!-- B -->
                        <div class="flex items-center justify-between">
                            <span class="text-2xl font-black">B</span>
                            <div onclick="toggleVar('B')" id="btn-B" class="btn-logic w-16 h-16 rounded-xl bg-blue-600 flex items-center justify-center text-3xl font-black">0</div>
                        </div>
                        <!-- C -->
                        <div class="flex items-center justify-between">
                            <span class="text-2xl font-black">C</span>
                            <div onclick="toggleVar('C')" id="btn-C" class="btn-logic w-16 h-16 rounded-xl bg-blue-600 flex items-center justify-center text-3xl font-black">0</div>
                        </div>
                    </div>
                </div>

                <div class="panel-glass p-6 rounded-2xl border-l-8 border-yellow-400 text-center">
                    <h2 class="text-[10px] font-bold text-slate-400 mb-2">RESULTADO FINAL (F)</h2>
                    <div id="display-f" class="text-7xl font-black text-blue-500 transition-all duration-300">0</div>
                </div>
            </div>

            <!-- AREA DE CIRCUITO (CENTRO) -->
            <div class="lg:col-span-6 grid-bg p-4 min-h-[600px] border-4 border-slate-300 overflow-hidden shadow-inner">
                <div class="absolute top-4 left-4 flex gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-400"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
                    <div class="w-3 h-3 rounded-full bg-green-400"></div>
                </div>
                <svg id="schematic" viewBox="0 0 800 600" class="w-full h-full">
                    <!-- El contenido se genera dinámicamente -->
                </svg>
            </div>

            <!-- TABLA Y DATOS (DERECHA) -->
            <div class="lg:col-span-3 space-y-4">
                <div class="panel-glass p-4 rounded-2xl border-t-4 border-indigo-500 h-[350px] flex flex-col">
                    <h2 class="text-xs font-black text-center mb-4 text-indigo-300 italic">TABLA DE VERDAD ANALÍTICA</h2>
                    <div class="overflow-y-auto flex-grow custom-scroll">
                        <table class="w-full text-xs text-center border-collapse">
                            <thead class="bg-indigo-900/50 text-indigo-200 sticky top-0">
                                <tr>
                                    <th class="p-2 border border-white/5">A</th>
                                    <th class="p-2 border border-white/5">B</th>
                                    <th class="p-2 border border-white/5">C</th>
                                    <th class="p-2 border border-white/5 bg-indigo-600">F</th>
                                </tr>
                            </thead>
                            <tbody id="truth-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-black/80 p-6 rounded-2xl border-2 border-slate-700 flex flex-col items-center justify-center">
                    <p class="text-[10px] text-emerald-500 font-bold mb-2">MONITOR DE SALIDA</p>
                    <div class="flex gap-4">
                        <div class="flex flex-col items-center">
                            <div id="led-f" class="w-12 h-12 rounded-full bg-blue-900 border-4 border-white/20 transition-all duration-300"></div>
                            <span class="text-[10px] mt-2 text-slate-500">PROBE_OUT</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let state = { A: 0, B: 0, C: 1 };

        function toggleVar(v) {
            state[v] = state[v] === 0 ? 1 : 0;
            const btn = document.getElementById(`btn-${v}`);
            btn.innerText = state[v];
            btn.className = `btn-logic w-16 h-16 rounded-xl border-4 border-white flex items-center justify-center text-3xl font-black ${state[v] ? 'bg-red-600' : 'bg-blue-600'}`;
            update();
        }

        function calculateLogic() {
            const { A, B, C } = state;
            // Ecuación: F = (-A*-B*C) + (-A*B*C) + (A*B*C)
            const t1 = (!A && !B && C);
            const t2 = (!A && B && C);
            const t3 = (A && B && C);
            const f = (t1 || t2 || t3) ? 1 : 0;
            return { f, t1, t2, t3, invA: !A ? 1 : 0, invB: !B ? 1 : 0 };
        }

        function drawSchematic() {
            const svg = document.getElementById('schematic');
            const { A, B, C } = state;
            const res = calculateLogic();

            svg.innerHTML = `
                <defs>
                    <symbol id="gate-not" viewBox="0 0 50 50">
                        <path d="M 10 10 L 10 40 L 35 25 Z" class="gate-body"/>
                        <circle cx="40" cy="25" r="4" class="gate-body"/>
                    </symbol>
                    <symbol id="gate-and" viewBox="0 0 60 50">
                        <path d="M 10 5 L 10 45 L 30 45 Q 55 45 55 25 Q 55 5 30 5 Z" class="gate-body"/>
                    </symbol>
                    <symbol id="gate-or" viewBox="0 0 60 50">
                        <path d="M 10 5 Q 25 25 10 45 Q 40 45 55 25 Q 40 5 10 5 Z" class="gate-body"/>
                    </symbol>
                </defs>

                <!-- 1. ENTRADAS (Aumentadas) -->
                ${['A', 'B', 'C'].map((label, i) => {
                    const y = 100 + (i * 180);
                    const val = state[label];
                    return `
                        <text x="30" y="${y+8}" class="fill-slate-800 font-black text-2xl">${label}</text>
                        <path d="M 70 ${y} L 150 ${y}" class="wire ${val ? 'high' : 'low'}" />
                        <text x="110" y="${y-10}" class="status-bubble ${val ? 'bubble-high' : 'bubble-low'}">${val}</text>
                    `;
                }).join('')}

                <!-- 2. INVERSORES (NOT) -->
                <!-- NOT A -->
                <use href="#gate-not" x="150" y="75" width="60" height="50" />
                <text x="160" y="70" class="gate-text italic">INV_A</text>
                <path d="M 210 100 L 280 100" class="wire ${res.invA ? 'high' : 'low'}" />
                <text x="240" y="90" class="status-bubble ${res.invA ? 'bubble-high' : 'bubble-low'}">${res.invA}</text>

                <!-- NOT B -->
                <use href="#gate-not" x="150" y="255" width="60" height="50" />
                <text x="160" y="250" class="gate-text italic">INV_B</text>
                <path d="M 210 280 L 280 280" class="wire ${res.invB ? 'high' : 'low'}" />
                <text x="240" y="270" class="status-bubble ${res.invB ? 'bubble-high' : 'bubble-low'}">${res.invB}</text>

                <!-- 3. COMPUERTAS AND (Términos) -->
                <!-- AND T1 (-A*-B*C) -->
                <use href="#gate-and" x="350" y="150" width="80" height="60" />
                <text x="360" y="145" class="gate-text">AND_T1</text>
                
                <!-- Conexiones a AND T1 -->
                <path d="M 280 100 L 320 100 L 320 170 L 350 170" class="wire ${res.invA ? 'high' : 'low'}" />
                <path d="M 280 280 L 320 280 L 320 190 L 350 190" class="wire ${res.invB ? 'high' : 'low'}" />
                <path d="M 70 460 L 330 460 L 330 205 L 350 205" class="wire ${C ? 'high' : 'low'}" />
                
                <!-- Salida AND T1 -->
                <path d="M 430 180 L 520 180 L 520 270 L 550 270" class="wire ${res.t1 ? 'high' : 'low'}" />
                <text x="470" y="170" class="status-bubble ${res.t1 ? 'bubble-high' : 'bubble-low'}">${res.t1 ? 1 : 0}</text>

                <!-- 4. OR FINAL -->
                <use href="#gate-or" x="550" y="250" width="100" height="80" />
                <text x="560" y="245" class="gate-text" fill="#2563eb">SUM_STAGE</text>
                
                <!-- Salida Final -->
                <path d="M 650 290 L 720 290" class="wire ${res.f ? 'high' : 'low'}" />
                <circle cx="740" cy="290" r="15" fill="${res.f ? '#ef4444' : '#2563eb'}" stroke="#fff" stroke-width="4" />
                <text x="740" y="297" text-anchor="middle" fill="#fff" font-weight="black" font-size="20">${res.f}</text>
            `;
        }

        function renderTable() {
            const body = document.getElementById('truth-table-body');
            body.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const a = (i & 4) ? 1 : 0;
                const b = (i & 2) ? 1 : 0;
                const c = (i & 1) ? 1 : 0;
                
                const f = ((!a && !b && c) || (!a && b && c) || (a && b && c)) ? 1 : 0;
                const isCurrent = (a === state.A && b === state.B && c === state.C);
                
                body.innerHTML += `
                    <tr class="${isCurrent ? 'bg-yellow-400 text-black font-black' : 'hover:bg-white/5'} transition-colors border-b border-white/5">
                        <td class="p-3">${a}</td>
                        <td class="p-3">${b}</td>
                        <td class="p-3">${c}</td>
                        <td class="p-3 ${isCurrent ? 'bg-black text-yellow-400' : 'text-blue-400 font-bold'}">${f}</td>
                    </tr>
                `;
            }
        }

        function update() {
            const res = calculateLogic();
            
            // UI Inferior
            const outTxt = document.getElementById('display-f');
            outTxt.innerText = res.f;
            outTxt.className = `text-7xl font-black transition-all duration-300 ${res.f ? 'text-red-500 scale-110 drop-shadow-[0_0_15px_rgba(239,68,68,0.5)]' : 'text-blue-500'}`;
            
            document.getElementById('led-f').className = `w-12 h-12 rounded-full border-4 border-white/20 transition-all duration-300 ${res.f ? 'bg-red-500 shadow-[0_0_20px_#ef4444]' : 'bg-blue-900'}`;

            drawSchematic();
            renderTable();
        }

        // Inicio
        update();
    </script>
</body>
</html>
